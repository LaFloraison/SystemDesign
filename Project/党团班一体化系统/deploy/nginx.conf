# Nginx for Windows 配置文件
# 放到 nginx/conf/nginx.conf (替换原有内容) 或 nginx/conf/conf.d/djxt.conf

worker_processes  2;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # HTTP → 强制跳转 HTTPS (如果有SSL证书)
    # server {
    #     listen 80;
    #     server_name 你的域名或IP;
    #     return 301 https://$host$request_uri;
    # }

    server {
        # 如果无SSL: 用 80; 有SSL: 用 443 ssl
        listen 80;
        server_name 你的服务器IP;

        # SSL证书配置 (阿里云免费SSL → nginx/ssl/)
        # ssl_certificate      ssl/server.crt;
        # ssl_certificate_key  ssl/server.key;

        charset utf-8;

        # 静态文件 — 由 Nginx 直接返回
        location /static/ {
            alias "D:/ProjectBase/SystemDesign/Project/党团班一体化系统/staticfiles/";
        }

        # 用户上传文件
        location /media/ {
            alias "D:/ProjectBase/SystemDesign/Project/党团班一体化系统/media/";
        }

        # Django 应用请求 — 转发给 Waitress
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 静态文件404不记录错误日志
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
