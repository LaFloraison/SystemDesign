{% extends "base.html" %}
{% block content %}
<h2>发布公示</h2>
<div class="col-md-8">
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">标题</label>{{ form.title }}</div>
    <div class="mb-3"><label class="form-label">内容</label>{{ form.content }}</div>
    <div class="mb-3"><label class="form-label">是否需要提交材料</label>{{ form.need_material }}</div>
    <div class="mb-3"><label class="form-label">材料收集开始</label>{{ form.collection_start }}</div>
    <div class="mb-3"><label class="form-label">材料收集截止</label>{{ form.collection_end }}</div>
    <button type="submit" class="btn btn-primary">发布</button>
    <a href="{% url 'publicity_list' %}" class="btn btn-secondary">取消</a>
</form>
</div>
{% endblock %}
