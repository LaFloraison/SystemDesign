{% extends "base.html" %}
{% block content %}
<h2>提交材料 - {{ publicity.title }}</h2>
<div class="col-md-8">
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">材料内容</label>{{ form.material_content }}</div>
    <div class="mb-3"><label class="form-label">附件路径</label>{{ form.attachment_path }}</div>
    <button type="submit" class="btn-gradient">提交</button>
    <a href="{% url 'publicity_detail' publicity.id %}" class="btn-ghost">取消</a>
</form>
</div>
{% endblock %}
