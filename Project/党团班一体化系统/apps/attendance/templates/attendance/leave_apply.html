{% extends "base.html" %}
{% block content %}
<h2>请假申请</h2>
<div class="col-md-6">
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">请假日期</label>{{ form.leave_date }}</div>
    <div class="mb-3"><label class="form-label">请假原因</label>{{ form.reason }}</div>
    <button type="submit" class="btn-gradient">提交</button>
    <a href="{% url 'attendance_records' %}" class="btn-ghost">取消</a>
</form>
</div>
{% endblock %}
