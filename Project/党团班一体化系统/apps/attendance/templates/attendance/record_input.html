{% extends "base.html" %}
{% block content %}
<h2>录入考勤 - {{ task.name }} ({{ task.attendance_time|date:"Y-m-d" }})</h2>
<form method="post">
    {% csrf_token %}
    <table class="table">
        <thead><tr><th>姓名</th><th>学号</th><th>状态</th><th>备注</th></tr></thead>
        <tbody>
        {% for c in classmates %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.student_id }}</td>
            <td>
                <select name="status_{{ c.id }}" class="form-select form-select-sm">
                    <option value="出勤">出勤</option>
                    <option value="缺勤">缺勤</option>
                    <option value="请假">请假</option>
                </select>
            </td>
            <td><input type="text" name="remark_{{ c.id }}" class="form-control form-control-sm"></td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <button type="submit" class="btn btn-primary">保存考勤</button>
</form>
{% endblock %}
