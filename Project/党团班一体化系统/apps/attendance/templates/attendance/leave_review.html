{% extends "base.html" %}
{% block content %}
<h2>请假审核</h2>
<p><strong>申请人:</strong> {{ leave.user.name }}</p>
<p><strong>日期:</strong> {{ leave.leave_date|date:"Y-m-d" }}</p>
<p><strong>原因:</strong> {{ leave.reason }}</p>
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">审核结果</label>{{ form.status }}</div>
    <div class="mb-3"><label class="form-label">审核意见</label>{{ form.review_comment }}</div>
    <button type="submit" class="btn btn-primary">提交审核</button>
    <a href="{% url 'leave_list' %}" class="btn btn-secondary">取消</a>
</form>
{% endblock %}
