{% extends "base.html" %}
{% block content %}
<h2 class="text-center" style="margin-bottom:20px;">登录</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">学号</label>
        {{ form.username }}
    </div>
    <div class="mb-3">
        <label class="form-label">密码</label>
        {{ form.password }}
    </div>
    {% if form.errors %}
    <div class="alert alert-danger" style="font-size:var(--text-sm);">学号或密码错误</div>
    {% endif %}
    <button type="submit" class="btn-gradient" style="width:100%;justify-content:center;height:42px;">登录</button>
</form>
<p class="text-center mt-3" style="font-size:var(--text-sm);color:var(--text-secondary);">
    没有账号？<a href="{% url 'register' %}">注册</a>
</p>
{% endblock %}
