{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">注册</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3"><label class="form-label">学号</label>{{ form.student_id }}</div>
            <div class="mb-3"><label class="form-label">姓名</label>{{ form.name }}</div>
            <div class="mb-3"><label class="form-label">性别</label>{{ form.gender }}</div>
            <div class="mb-3"><label class="form-label">班级</label>{{ form.class_name }}</div>
            <div class="mb-3"><label class="form-label">手机号</label>{{ form.phone }}</div>
            <div class="mb-3"><label class="form-label">密码</label>{{ form.password }}</div>
            <div class="mb-3"><label class="form-label">确认密码</label>{{ form.password_confirm }}</div>
            {% if form.errors %}
            <div class="alert alert-danger">{{ form.errors }}</div>
            {% endif %}
            <button type="submit" class="btn btn-primary">注册</button>
            <a href="{% url 'login' %}" class="btn btn-link">已有账号？登录</a>
        </form>
    </div>
</div>
{% endblock %}
