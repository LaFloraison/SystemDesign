{% extends "base.html" %}
{% block content %}
<h2 class="text-center" style="margin-bottom:20px;">注册</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">学号</label>{{ form.student_id }}</div>
    <div class="mb-3"><label class="form-label">姓名</label>{{ form.name }}</div>
    <div class="row">
        <div class="col-6 mb-3"><label class="form-label">性别</label>{{ form.gender }}</div>
        <div class="col-6 mb-3"><label class="form-label">班级</label>{{ form.class_name }}</div>
    </div>
    <div class="mb-3"><label class="form-label">手机号</label>{{ form.phone }}</div>
    <div class="mb-3"><label class="form-label">密码</label>{{ form.password }}</div>
    <div class="mb-3"><label class="form-label">确认密码</label>{{ form.password_confirm }}</div>
    {% if form.errors %}<div class="alert alert-danger" style="font-size:var(--text-sm);">{{ form.errors }}</div>{% endif %}
    <button type="submit" class="btn-gradient" style="width:100%;justify-content:center;height:42px;">注册</button>
</form>
<p class="text-center mt-3" style="font-size:var(--text-sm);color:var(--text-secondary);">
    已有账号？<a href="{% url 'login' %}">登录</a>
</p>
{% endblock %}
