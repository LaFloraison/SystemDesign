{% extends "base.html" %}
{% block content %}
<h2>编辑个人信息</h2>
{% if user.role == '普通学生' %}
<div class="alert alert-info">修改信息需要班长审核后才能生效</div>
{% endif %}
<div class="col-md-6">
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">姓名</label>{{ form.name }}</div>
    <div class="mb-3"><label class="form-label">性别</label>{{ form.gender }}</div>
    <div class="mb-3"><label class="form-label">手机号</label>{{ form.phone }}</div>
    <div class="mb-3"><label class="form-label">政治面貌</label>{{ form.political_status }}</div>
    <div class="mb-3"><label class="form-label">班级</label>{{ form.class_name }}</div>
    <div class="mb-3"><label class="form-label">入学时间</label>{{ form.enrollment_date }}</div>
    <button type="submit" class="btn-gradient">保存</button>
    <a href="{% url 'profile' %}" class="btn-ghost">取消</a>
</form>
</div>
{% endblock %}
