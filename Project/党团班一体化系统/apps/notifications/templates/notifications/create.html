{% extends "base.html" %}
{% block content %}
<h2>发布通知</h2>
<div class="col-md-8">
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">标题</label>{{ form.title }}</div>
    <div class="mb-3"><label class="form-label">内容</label>{{ form.content }}</div>
    <div class="mb-3"><label class="form-label">截止时间</label>{{ form.deadline }}</div>
    <button type="submit" class="btn btn-primary">发布</button>
    <a href="{% url 'notification_list' %}" class="btn btn-secondary">取消</a>
</form>
</div>
{% endblock %}
