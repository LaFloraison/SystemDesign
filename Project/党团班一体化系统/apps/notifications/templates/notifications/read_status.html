{% extends "base.html" %}
{% block content %}
<h2>{{ notification.title }} - 阅读状态</h2>
<table class="table mt-3">
    <thead><tr><th>姓名</th><th>学号</th><th>状态</th><th>阅读时间</th></tr></thead>
    <tbody>
    {% for r in records %}
    <tr>
        <td>{{ r.user.name }}</td>
        <td>{{ r.user.student_id }}</td>
        <td>
            {% if r.status == '已读' %}<span class="badge-status badge-status--approved">已读</span>
            {% else %}<span class="badge-status badge-status--rejected">未读</span>{% endif %}
        </td>
        <td>{{ r.read_time|date:"Y-m-d H:i"|default:"-" }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
<a href="{% url 'notification_detail' notification.id %}" class="btn-ghost">返回</a>
{% endblock %}
